services:
  squid:
    container_name: squid
    image: docker.io/ubuntu/squid:latest
    volumes:
      - ./containers/squid/files/squid.conf:/etc/squid/squid.conf
      - ./containers/squid/files/whitelist.txt:/etc/squid/whitelist.txt
    networks:
      - internal
      - internet

  postgres:
    container_name: postgres
    build:
      context: .
      dockerfile: "containers/postgres/Containerfile"
    image: "localhost/postgres"
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: postgres
    environment:
      - POSTGRES_PASSWORD=unused-but-required-for-init-will-be-deleted-with-init-script-remove-superuser-password.sql
    volumes:
      - postgres-data:/var/lib/postgresql
      - postgres-socket:/var/run/postgresql
      - ./containers/postgres/files/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

  odoo:
    build:
      context: .
      dockerfile: "containers/odoo/images/${DOCKERFILE:-trixie}/Containerfile"
    image: "localhost/odoo:${DOCKERFILE:-trixie}"
    depends_on:
      - postgres
      - squid
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: odoo
    environment:
      - DISPLAY=:1
      - ODOO_SRC=${ODOO_SRC:-$HOME/src}
    env_file:
      # Proxy settings are injected only at runtime.
      # During image builds, pip must bypass the HTTP proxy because PyPI and related
      # package repositories are not included in the proxy whitelist.
      - containers/odoo/proxy.env
    volumes:
      - postgres-socket:/var/run/postgresql:ro
      - odoo-local:/home/odoo/.local
      - ${ODOO_SRC:-$HOME/src}/odoo:${ODOO_SRC:-$HOME/src}/odoo
      - ${ODOO_SRC:-$HOME/src}/enterprise:${ODOO_SRC:-$HOME/src}/enterprise
      - ${ODOO_SRC:-$HOME/src}/design-themes:${ODOO_SRC:-$HOME/src}/design-themes
      - ${ODOO_SRC:-$HOME/src}/upgrade:${ODOO_SRC:-$HOME/src}/upgrade
      - ${ODOO_SRC:-$HOME/src}/upgrade-util:${ODOO_SRC:-$HOME/src}/upgrade-util
      - ./containers/odoo/files/bin/odoo:/usr/local/bin/odoo:ro
      - x11-socket:/tmp/.X11-unix
    networks:
      - internal

  x11:
    container_name: x11
    build:
      context: .
      dockerfile: "containers/x11/Containerfile"
    image: "localhost/x11"
    volumes:
      - x11-socket:/tmp/.X11-unix
    ports:
      - "127.0.0.1:6080:6080"
    networks:
      - internal

volumes:
  postgres-data:
  postgres-socket:
  odoo-local:
  x11-socket:

networks:
  internal:
    internal: true
  internet:
    driver: bridge

x-podman:
    in_pod: false  # See https://github.com/containers/podman-compose/pull/964
