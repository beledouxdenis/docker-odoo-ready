services:
  squid:
    container_name: squid
    image: docker.io/ubuntu/squid:latest
    volumes:
      - ./containers/squid/files/squid.conf:/etc/squid/squid.conf
      - ./containers/squid/files/whitelist.txt:/etc/squid/whitelist.txt
    networks:
      - internal
      - internet

  postgres:
    container_name: postgres
    build:
      context: .
      dockerfile: "containers/postgres/Containerfile"
    image: "localhost/postgres"
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: postgres
    environment:
      - POSTGRES_PASSWORD=unused-but-required-for-init-will-be-deleted-with-init-script-remove-superuser-password.sql
    volumes:
      - postgres-data:/var/lib/postgresql
      - postgres-socket:/var/run/postgresql
      - ./containers/postgres/files/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

  odoo:
    build:
      context: .
      dockerfile: "containers/odoo/images/${DOCKERFILE:-trixie}/Containerfile"
    image: "localhost/odoo:${DOCKERFILE:-trixie}"
    depends_on:
      - postgres
      - squid
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: odoo
    environment:
      - DISPLAY=:1
      - ODOO_SRC=${ODOO_SRC:-$HOME/src}
    env_file:
      # Proxy settings are injected only at runtime.
      # During image builds, pip must bypass the HTTP proxy because PyPI and related
      # package repositories are not included in the proxy whitelist.
      - containers/odoo/proxy.env
    volumes:
      - postgres-socket:/var/run/postgresql:ro
      - odoo-local:/home/odoo/.local
      - ${ODOO_SRC:-$HOME/src}/odoo:${ODOO_SRC:-$HOME/src}/odoo
      - ${ODOO_SRC:-$HOME/src}/enterprise:${ODOO_SRC:-$HOME/src}/enterprise
      - ${ODOO_SRC:-$HOME/src}/design-themes:${ODOO_SRC:-$HOME/src}/design-themes
      - ${ODOO_SRC:-$HOME/src}/upgrade:${ODOO_SRC:-$HOME/src}/upgrade
      - ${ODOO_SRC:-$HOME/src}/upgrade-util:${ODOO_SRC:-$HOME/src}/upgrade-util
      - ./containers/odoo/files/bin/odoo:/usr/local/bin/odoo:ro
      - x11-socket:/tmp/.X11-unix
    networks:
      - internal

  x11:
    container_name: x11
    build:
      context: .
      dockerfile: "containers/x11/Containerfile"
    image: "localhost/x11"
    volumes:
      - x11-socket:/tmp/.X11-unix
    ports:
      - "127.0.0.1:6080:6080"
    networks:
      - internal

  podman-broker:
    container_name: podman-broker
    build:
      context: .
      dockerfile: containers/podman-broker/Containerfile
    image: localhost/podman-broker
    environment:
      CONTAINER_HOST: unix:///run/podman/podman.sock
      ODOO_SRC: ${ODOO_SRC:-$HOME/src}
      PODMAN_BROKER_REPO: ${PWD}
    volumes:
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/run/podman/podman.sock
      - ${ODOO_SRC:-$HOME/src}/odoo:${ODOO_SRC:-$HOME/src}/odoo:ro
      - ./docker-compose.yml:${PWD}/docker-compose.yml:ro
      - ./docker-odoo:${PWD}/docker-odoo:ro
      - ./containers:${PWD}/containers:ro
      - podman-broker-socket:/broker

  codex:
    build:
      context: .
      dockerfile: containers/codex/Containerfile
    image: localhost/codex
    depends_on:
      - podman-broker
      - postgres
      - squid
    networks:
      - internal
    userns_mode: "keep-id:uid=1000,gid=1000"
    user: odoo
    environment:
      DISPLAY: :1
      CODEX_HOME: /home/odoo/.codex
      ODOO_SRC: ${ODOO_SRC:-$HOME/src}
      PODMAN_BROKER_SOCKET: /broker/docker-odoo.sock
      VISUAL: vim  # To be able to use vim as editor in codex using CTRL + G
      WT_SESSION: $WT_SESSION  # To support codex pets in Windows Terminal
    env_file:
      # Proxy settings are injected only at runtime.
      # During image builds, pip must bypass the HTTP proxy because PyPI and related
      # package repositories are not included in the proxy whitelist.
      - containers/odoo/proxy.env
    volumes:
      - local:/home/odoo/.local
      - codex-home:/home/odoo/.codex
      - ./containers/codex/AGENTS.md:/home/odoo/.codex/AGENTS.md:ro
      - codex-workspace:/workspace
      - ${HOME}/Downloads/codex-documents:/workspace/documents
      - podman-broker-socket:/broker
      - ./containers/podman-broker/docker-odoo-client.py:/usr/local/bin/docker-odoo:ro
      - ${ODOO_SRC:-$HOME/src}/odoo:${ODOO_SRC:-$HOME/src}/odoo
      - ${ODOO_SRC:-$HOME/src}/enterprise:${ODOO_SRC:-$HOME/src}/enterprise
      - ${ODOO_SRC:-$HOME/src}/design-themes:${ODOO_SRC:-$HOME/src}/design-themes
      - ${ODOO_SRC:-$HOME/src}/upgrade:${ODOO_SRC:-$HOME/src}/upgrade
      - ${ODOO_SRC:-$HOME/src}/upgrade-util:${ODOO_SRC:-$HOME/src}/upgrade-util
    working_dir: /workspace
    command:
      - /home/odoo/.local/bin/codex
      - --ask-for-approval
      - never
      - --sandbox
      - danger-full-access

volumes:
  postgres-data:
  postgres-socket:
  odoo-local:
  x11-socket:
  local:
  codex-home:
  codex-workspace:
  podman-broker-socket:

networks:
  internal:
    internal: true
  internet:
    driver: bridge

x-podman:
    in_pod: false  # See https://github.com/containers/podman-compose/pull/964
