http_port 3128

# Define where the whitelist file lives inside the container
acl whitelisted_sites dstdomain "/etc/squid/whitelist.txt"

# Standard ports allowed for proxying
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl CONNECT method CONNECT

# Deny requests to unintended ports
http_access deny !Safe_ports
http_access deny CONNECT !Safe_ports

# Enforce the Whitelist: Allow whitelisted destinations, deny everything else
http_access allow whitelisted_sites
http_access allow localhost
http_access deny all

# Optional: Log format and locations for debugging
access_log stdio:/var/log/squid/access.log
