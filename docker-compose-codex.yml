services:
  odoo:
    build:
      dockerfile: "images/${DOCKERFILE}-codex.dockerfile"
    image: "localhost/odoo:${DOCKERFILE}-codex"

    volumes:
      - ./.codex/home:/home/$USER/.codex:Z
      - ./.codex/workspace:/home/$USER/workspace:Z

    environment:
      CODEX_HOME: /home/$USER/.codex
      WT_SESSION: $WT_SESSION  # To support codex pets in Windows Terminal, very important

    working_dir: /home/$USER/workspace
