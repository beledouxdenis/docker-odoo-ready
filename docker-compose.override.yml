services:
  codex:
    extends:
      service: odoo
    build:
      dockerfile: "containers/codex/images/${DOCKERFILE:-trixie}/Containerfile"
    image: "localhost/odoo:${DOCKERFILE:-trixie}-codex"

    volumes:
      - codex-home:/home/odoo/.codex
      - ./containers/codex/AGENTS.md:/home/odoo/.codex/AGENTS.md:ro
      - codex-workspace:/workspace
      - ~/Downloads/codex-documents:/workspace/documents

    environment:
      CODEX_HOME: /home/odoo/.codex
      VISUAL: vim  # To be able to use vim as editor in codex using CTRL + G
      WT_SESSION: $WT_SESSION  # To support codex pets in Windows Terminal, very important

    working_dir: /workspace

    command:
      - /home/odoo/bin/codex
      - --ask-for-approval
      - never
      - --sandbox
      - danger-full-access

volumes:
  codex-home:
  codex-workspace:
